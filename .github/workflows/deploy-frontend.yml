name: Deploy Frontend to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./event-frontend
        run: npm install

      - name: Build frontend
        working-directory: ./event-frontend
        run: npm run build
        env:
          REACT_APP_API_URL: https://event-backend-iba-fzbkbpdqb6f9f2am.uaenorth-01.azurewebsites.net
          CI: false

      - name: Add server files to build
        run: |
          cat > ./event-frontend/build/server.js << 'EOF'
          const express = require('express');
          const path = require('path');
          const app = express();
          const PORT = process.env.PORT || 3000;
          app.use(express.static(path.join(__dirname)));
          app.get('*', (req, res) => {
            res.sendFile(path.join(__dirname, 'index.html'));
          });
          app.listen(PORT, () => console.log(`Frontend running on port ${PORT}`));
          EOF

          cat > ./event-frontend/build/package.json << 'EOF'
          {
            "name": "event-frontend-server",
            "version": "1.0.0",
            "main": "server.js",
            "scripts": {
              "start": "node server.js"
            },
            "dependencies": {
              "express": "^4.18.2"
            }
          }
          EOF

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'event-frontend-iba'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
          package: ./event-frontend/build
